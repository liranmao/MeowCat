# Example 5: Train on multiple Visium + multiple Xenium samples
#            (3-phase sequential training with CDAN domain adaptation)
# Input:  /project/KidneyHE/01_meowcat_test/05_multi_visium_xenium/input/
#           VIS_S1/  VIS_S2/   (2 Visium samples)
#           XEN_S1/  XEN_S2/   (2 Xenium samples)
# Output: /project/KidneyHE/01_meowcat_test/05_multi_visium_xenium/output/

project:
  name: ex05_multi_visium_xenium
  data_root: /project/KidneyHE/01_meowcat_test/05_multi_visium_xenium/input
  out_root:  /project/KidneyHE/01_meowcat_test/05_multi_visium_xenium/output

visium:
  sample_pattern: "VIS*"   # preprocess auto-discovers all samples (VIS* + XEN*)
  keep_frac: 0.25     # subsample to 25% per sample to keep training tractable
  strategy: stratified
  seed: 0

rctd:
  reference_rds: /project/CATCH/liran/he_anno/data_lung/single_cell/snRNA_all_in_one.to_Mingyao_Group.rds
  cell_type_column: MainType
  group_column: Group_ID
  groups: [LUAD]
  max_cores: 10
  doublet_mode: full
  min_umi: 10

# Image preprocessing — data-agnostic, applies to ALL samples (Visium and Xenium).
# pixel_size_raw here is the raw H&E image MPP (null = auto-detect from metadata).
# For mixed Visium+Xenium configs, use null so each image's MPP is detected independently.
preprocess:
  raw_flag: he_raw
  target_mpp: 0.5
  pixel_size_raw: null   # auto-detect per image (use null for mixed Visium+Xenium)
  pad: 224
  uni_weights: /project/KidneyHE/UNI/assets/ckpts/vit_large_patch16_224.dinov2.uni_mass100k/pytorch_model.bin
  fusion_mode: single

# Visium batch preparation — only used by `meowcat prepare-visium-batches`.
batches:
  out_dir: /project/KidneyHE/01_meowcat_test/05_multi_visium_xenium/output/batches

# Xenium batch preparation — only used by `meowcat prepare-xenium-batches`.
# NOTE: This section does NOT control image preprocessing (that's the `preprocess` section).
# It controls how Xenium cell coordinates and annotations are tokenized into training batches.
# dapi_pixel_size_raw is the Xenium DAPI instrument's pixel size (for micron→pixel coordinate
# conversion in cells.parquet), NOT the H&E image MPP.
# Each XEN_* sample folder should contain: xenium_raw/, adata_cellbin_HistoSweep.h5ad, annotation.csv
xenium:
  sample_pattern: "XEN*"
  dapi_pixel_size_raw: 0.2125
  fixed_radius: 75.20
  anno_names_path: /project/KidneyHE/01_meowcat_test/05_multi_visium_xenium/input/VIS_S1/anno-names.txt
  cell_type_mapping_json: /home/liranmao/06_he_anno/code/MeowCat/MeowCat/config/cell_type_mapping_lung.json
  seed: 42

# Training paradigm: Recon -> Visium MSE -> Xenium CE (3-phase sequential)
# Multiple patients -> enable CDAN for cross-patient domain adaptation.
train:
  n_states: 2
  two_stage: true
  epochs1: 15            # Phase 0: reconstruction pretraining
  sequential_training: true
  visium_epochs: 100     # Phase 1: Visium MSE
  xenium_epochs: 100     # Phase 2: Xenium CE fine-tuning
  adv_lambda: 0.005      # CDAN: light domain adversarial penalty across patients
  freeze_encoder_n: 2
  recon_weight: 0.1
  recon_mask_ratio: 0.3
  save_every_n_epochs: 10
  xenium_weight: 0.01
  monitor_metric: val_weak_mse
  # Out-of-sample monitoring: hold one sample out to watch generalisation
  oos_sample: /project/KidneyHE/01_meowcat_test/05_multi_visium_xenium/input/VIS_S2
  oos_tmpdir: /project/KidneyHE/01_meowcat_test/05_multi_visium_xenium/output/oos_batch
  device: cuda

predict:
  n_states: 2
  tokens_per_chunk: 70000
  chunks_per_batch: 2
  out_pkl_name: pred_fullgrid_outputs.pkl
  device: cuda

visualize:
  n_clusters: 6
  pca_comp: 100
  random_seed: 0
  p_lo: 5
  p_hi: 95
  save_highlights: true   # save per-cluster highlight images for multi-sample comparison
  cmap_json: null    # null = use bundled default (config/visualization_cmap.json)

slide:
  pptx: results_ex05.pptx
  intensity_cols: 3
  intensity_rows: 2
  highlight_cols: 4
  highlight_rows: 3
