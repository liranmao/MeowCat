# Example 4b: Train on multiple Xenium samples (no Visium)
#             Multi-patient with CDAN cross-patient domain adaptation
#             4 LUAD samples: P24, P19, P17, P11
# Input:  <DEMO_DATA_ROOT>/04_multi_xenium/input/
#           P24_LUAD_Xenium/  P19_LUAD_Xenium/  P17_LUAD_Xenium/  P11_LUAD_Xenium/
# Output: <DEMO_DATA_ROOT>/04_multi_xenium/output/

project:
  name: ex04_multi_xenium
  data_root: <DEMO_DATA_ROOT>/04_multi_xenium/input
  out_root: <DEMO_DATA_ROOT>/04_multi_xenium/output

# No rctd section needed — Xenium uses hard labels from annotation.csv

preprocess:
  raw_flag: he_raw
  target_mpp: 0.5
  pixel_size_raw: 0.2125   # standard Xenium pixel size
  pad: 224
  uni_weights: <USER_PATH_TO_UNI_WEIGHTS>
  fusion_mode: single

batches:
  out_dir: <DEMO_DATA_ROOT>/04_multi_xenium/output/batches

xenium:
  sample_pattern: "P*"
  dapi_pixel_size_raw: 0.2125
  fixed_radius: 75.20
  anno_names_path: <DEMO_DATA_ROOT>/04_multi_xenium/input/anno-names.txt
  cell_type_mapping_json: config/cell_type_mapping_lung.json
  keep_frac: 0.03346869815 # same as visium 59389/(443616*4)
  seed: 42

# Training paradigm: Recon (Phase 0) -> Xenium CE (Phase 1) + CDAN
# Multiple patients -> enable CDAN for cross-patient domain adaptation.
train:
  n_states: 2
  two_stage: true
  epochs1: 15            # Phase 0: reconstruction pretraining
  sequential_training: false   # no Visium phase
  visium_epochs: 0
  xenium_epochs: 100     # Phase 1: Xenium CE training (passed as --epochs2)
  adv_lambda: 0.005      # CDAN: light domain adversarial penalty across patients
  freeze_encoder_n: 2
  recon_weight: 0.1
  recon_mask_ratio: 0.3
  save_every_n_epochs: 10
  xenium_weight: 1.0
  monitor_metric: val_loss
  oos_sample: null
  oos_tmpdir: null
  device: cuda

predict:
  n_states: 2
  tokens_per_chunk: 70000
  chunks_per_batch: 2
  out_pkl_name: pred_fullgrid_outputs.pkl
  device: cuda

visualize:
  n_clusters: 6
  pca_comp: 100
  random_seed: 0
  p_lo: 5
  p_hi: 95
  save_highlights: true   # save per-cluster highlight images for multi-sample comparison
  cmap_json: null    # null = use bundled default (config/visualization_cmap.json)

slide:
  pptx: results_ex04_multi_xenium.pptx
  intensity_cols: 3
  intensity_rows: 2
  highlight_cols: 4
  highlight_rows: 3
