# Example 3: Train on one Visium + one Xenium sample (3-phase sequential training)
# Input:  /project/KidneyHE/01_meowcat_test/03_visium_xenium_single/input/
#           VIS_P11_LUAD/  (Visium — symlinked from ex01)
#           XEN_P11_LUAD/  (Xenium — symlinked from ex02)
# Output: /project/KidneyHE/01_meowcat_test/03_visium_xenium_single/output/

project:
  name: ex03_visium_xenium_single
  data_root: /project/KidneyHE/01_meowcat_test/03_visium_xenium_single/input
  out_root:  /project/KidneyHE/01_meowcat_test/03_visium_xenium_single/output

# Both VIS* and XEN* samples live under the same data_root.
# preprocess auto-discovers all samples (VIS* + XEN*).
visium:
  sample_pattern: "VIS*"

rctd:
  reference_rds: /project/CATCH/liran/he_anno/data_lung/single_cell/snRNA_all_in_one.to_Mingyao_Group.rds
  cell_type_column: MainType
  group_column: Group_ID
  groups: [LUAD]
  max_cores: 10
  doublet_mode: full
  min_umi: 10

# Image preprocessing — data-agnostic, applies to ALL samples (Visium and Xenium).
# pixel_size_raw here is the raw H&E image MPP (null = auto-detect from metadata).
# For mixed Visium+Xenium configs, use null so each image's MPP is detected independently.
preprocess:
  raw_flag: he_raw
  target_mpp: 0.5
  pixel_size_raw: null      # auto-detect per image (use null for mixed Visium+Xenium)
  pad: 224
  uni_weights: /project/KidneyHE/UNI/assets/ckpts/vit_large_patch16_224.dinov2.uni_mass100k/pytorch_model.bin
  fusion_mode: single

# Visium batch preparation — only used by `meowcat prepare-visium-batches`.
batches:
  out_dir: /project/KidneyHE/01_meowcat_test/03_visium_xenium_single/output/batches
  keep_frac: 1.0
  strategy: stratified
  seed: 0

# Xenium batch preparation — only used by `meowcat prepare-xenium-batches`.
# NOTE: This section does NOT control image preprocessing (that's the `preprocess` section).
# It controls how Xenium cell coordinates and annotations are tokenized into training batches.
# dapi_pixel_size_raw is the Xenium DAPI instrument's pixel size (for micron→pixel coordinate
# conversion in cells.parquet), NOT the H&E image MPP.
# Each XEN_* sample folder should contain: xenium_raw/, adata_cellbin_HistoSweep.h5ad, annotation.csv
xenium:
  sample_pattern: "XEN*"
  # Xenium batches go to the SAME out_dir as Visium so training finds both
  out_dir: /project/KidneyHE/01_meowcat_test/03_visium_xenium_single/output/batches
  dapi_pixel_size_raw: 0.2125
  fixed_radius: 75.20
  anno_names_path: /project/KidneyHE/01_meowcat_test/03_visium_xenium_single/input/VIS_P11_LUAD/anno-names.txt
  cell_type_mapping_json: /home/liranmao/06_he_anno/code/MeowCat/MeowCat/config/cell_type_mapping_lung.json
  visium_batch_dir: /project/KidneyHE/01_meowcat_test/03_visium_xenium_single/output/batches
  seed: 42

# Training paradigm: Recon -> Visium MSE -> Xenium CE (3-phase sequential)
# batch_vis_* and batch_xen_* are both present in batches.out_dir.
train:
  n_states: 2
  two_stage: true
  epochs1: 15            # Phase 0: reconstruction pretraining
  sequential_training: true
  visium_epochs: 100     # Phase 1: Visium MSE
  xenium_epochs: 50      # Phase 2: Xenium CE fine-tuning
  adv_lambda: 0          # CDAN disabled (only 2 patients, too few for domain adapt.)
  freeze_encoder_n: 2    # freeze 2 encoder layers at each phase transition
  recon_weight: 0.1
  recon_mask_ratio: 0.3
  save_every_n_epochs: 10
  xenium_weight: 0.01    # down-weight Xenium CE to avoid overwriting Visium knowledge
  monitor_metric: val_weak_mse
  oos_sample: null
  oos_tmpdir: null
  device: cuda

predict:
  n_states: 2
  tokens_per_chunk: 70000
  chunks_per_batch: 2
  out_pkl_name: pred_fullgrid_outputs.pkl
  device: cuda

visualize:
  n_clusters: 6
  pca_comp: 100
  random_seed: 0
  p_lo: 5
  p_hi: 95
  save_highlights: false
  cmap_json: null    # null = use bundled default (config/visualization_cmap.json)

slide:
  pptx: results_ex03.pptx
  intensity_cols: 3
  intensity_rows: 2
  highlight_cols: 4
  highlight_rows: 3
