# Example 2: Train on a single Xenium sample P11_LUAD (hard labels, cross-entropy loss)
# Input:  /project/KidneyHE/01_meowcat_test/wrapped_data/02_xenium_only/input/XEN_P11_LUAD/
# Output: /project/KidneyHE/01_meowcat_test/wrapped_data/02_xenium_only/output/

project:
  name: ex02_xenium_only
  data_root: /project/KidneyHE/01_meowcat_test/wrapped_data/02_xenium_only/input
  out_root:  /project/KidneyHE/01_meowcat_test/wrapped_data/02_xenium_only/output

preprocess:
  raw_flag: he_raw
  target_mpp: 0.5
  pixel_size_raw: 0.2125   # standard Xenium pixel size
  pad: 224
  uni_weights: /project/KidneyHE/UNI/assets/ckpts/vit_large_patch16_224.dinov2.uni_mass100k/pytorch_model.bin
  fusion_mode: single

batches:
  out_dir: /project/KidneyHE/01_meowcat_test/wrapped_data/02_xenium_only/output/batches

# Xenium config — uses project.data_root for sample discovery.
# Each sample folder (e.g., input/XEN_P11_LUAD/) must contain (user-provided):
#   he_raw.<tif|svs>               -> raw H&E image (for meowcat preprocess)
#   xenium_raw/                    -> raw xenium data (cell_feature_matrix.h5, cells.parquet)
#   adata_cellbin_HistoSweep.h5ad  -> cell-bin location mapping (external HistoSweep)
#   annotation.csv                 -> cell type annotations (cell_id, cell_state)
xenium:
  sample_pattern: "XEN*"
  dapi_pixel_size_raw: 0.2125
  fixed_radius: 75.20
  anno_names_path: /project/KidneyHE/01_meowcat_test/wrapped_data/02_xenium_only/anno-names.txt
  cell_type_mapping_json: /home/liranmao/06_he_anno/code/MeowCat/MeowCat/config/cell_type_mapping_lung.json
  keep_frac: 0.5
  seed: 42

# Training paradigm: Recon (Phase 0) -> Xenium CE (Phase 1)
# No Visium batches present; the model trains in sc_only mode.
train:
  n_states: 2
  two_stage: true
  epochs1: 15           # Phase 0: reconstruction pretraining
  sequential_training: false
  visium_epochs: 0      # no Visium data
  xenium_epochs: 100    # Phase 1: Xenium CE training (passed as --epochs2)
  adv_lambda: 0         # CDAN disabled (single sample)
  freeze_encoder_n: 2
  recon_weight: 0.1
  recon_mask_ratio: 0.3
  save_every_n_epochs: 10
  xenium_weight: 1.0
  monitor_metric: val_loss
  oos_sample: null
  oos_tmpdir: null
  device: cuda

predict:
  n_states: 2
  tokens_per_chunk: 70000
  chunks_per_batch: 2
  out_pkl_name: pred_fullgrid_outputs.pkl
  device: cuda

visualize:
  n_clusters: 6
  pca_comp: 100
  random_seed: 0
  p_lo: 5
  p_hi: 95
  save_highlights: false
  cmap_json: null    # null = use bundled default (config/visualization_cmap.json)

slide:
  pptx: results_ex02.pptx
  intensity_cols: 3
  intensity_rows: 2
  highlight_cols: 4
  highlight_rows: 3
